apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable
  template:
    metadata:
      labels:
        app: vulnerable
    spec:
      containers:
        - name: app
          image: myapp
          ports:
            - containerPort: 3000
          securityContext:
            runAsUser: 1000   # Zone de vulnérabilité
